name: Run tests

on:
  pull_request:
    branches:
      - master

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow write access to checks to allow the action to annotate code in the PR.
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7.32
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_USER: iagd
          MYSQL_PASSWORD: 123456
          MYSQL_DATABASE: iagd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          --ulimit="nofile=32768:32768"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v6
      - name: Setup database
        run: |
          echo "SET GLOBAL max_connections = 100; SET GLOBAL group_concat_max_len = 1048576; GRANT ALL PRIVILEGES ON `iagd`.* TO 'iagd'@'%';" | mysql -h 127.0.0.1 -u root
          mysql -h 127.0.0.1 -u iagd -D iagd < rewrite/tables.sql

      - name: Run tests
        run: go test ./... -v -race -timeout 30s