name: Run tests

on:
  pull_request:
    branches:
      - master

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow write access to checks to allow the action to annotate code in the PR.
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.34
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_USER: iagd
          MYSQL_PASSWORD: 123456
          MYSQL_DATABASE: iagd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          --ulimit="nofile=32768:32768"
    steps:
      - uses: actions/checkout@v4
      - name: Try to fix the folder
        run: cd Server
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Setup db
        run: |
          echo "SET GLOBAL max_connections = 100; SET GLOBAL group_concat_max_len = 1048576;" | mysql -h 127.0.0.1 -u root
          echo "GRANT ALL PRIVILEGES ON iagd.* TO 'iagd'@'%';" | mysql -h 127.0.0.1 -u root
          pwd
          ls -la
          ls -la rewrite
          mysql -h 127.0.0.1 -u root -D iagd < rewrite/tables.sql

      - name: Run tests
        run: |
          cd Server
          pwd
          ls -la
          export DATABASE_USER=iagd
          export DATABASE_PASSWORD=123456
          export MYSQL_DATABASE=iagd
          export DATABASE_HOST=localhost
          DATABASE_USER=iagd DATABASE_PASSWORD=123456 MYSQL_DATABASE=iagd DATABASE_HOST=localhost go test ./... -v -race -timeout 30s
